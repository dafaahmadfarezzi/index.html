<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arjuna Store.id</title><style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #f5f5f5;
    }

    header {
      padding: 20px;
      text-align: center;
      background: linear-gradient(90deg,#111,#1f1f1f);
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .container {
      padding: 30px;
      max-width: 900px;
      margin: auto;
    }

    .input-box {
      text-align: center;
      margin-bottom: 30px;
    }

    input {
      padding: 12px;
      width: 280px;
      border-radius: 8px;
      border: none;
      background: #1a1a1a;
      color: white;
      outline: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
      gap: 20px;
    }

    .card {
      background: linear-gradient(145deg,#1a1a1a,#111);
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 0 15px rgba(255,255,255,0.05);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 25px rgba(255,255,255,0.1);
    }

    .price {
      margin: 10px 0;
      font-size: 18px;
      color: #ccc;
    }

    button {
      background: linear-gradient(90deg,#c0a060,#ffd700);
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.85;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: #888;
    }
  </style></head>
<body><header>
  Arjuna Store
</header><div class="container">  <div class="input-box">
    <input type="text" id="userID" placeholder="Masukkan ID Game">
  </div><div class="grid"><div class="card">
  <h3>FF</h3>
  <h3>💎 420 Diamonds</h3>
  <div class="price">Rp 20.000</div>
  <button onclick="checkout('420 Diamonds',20.000)">Pesan</button>
</div>

<div class="card">
<h3> PUBG</h3>
  <h3>💎 565 Diamonds</h3>
  <div class="price">Rp 40.000</div>
  <button onclick="checkout('565 Diamonds',40.000)">Pesan</button>
</div>

<div class="card">
<h3>CODM</h3>
  <h3>💎 635 Diamonds</h3>
  <div class="price">Rp 60.000</div>
  <button onclick="checkout('635 Diamonds',60.000)">Pesan</button>
</div>
<div class="card">
<h3>Clash of clans</h3>
<h3>💎 720 Diamonds</h3>
<div class="price">Rp 48.000</div>
<button onclic="checkout"(720 Diamonds',48.000)">Pesan</button> 

  </div></div><footer>
  © 2026 Arjuna Store • All Rights Reserved
</footer><script>
  function checkout(item, harga) {
    const userID = document.getElementById('userID').value;

    if (!userID) {
      alert('Masukkan ID Game dulu!');
      return;
    }

    const pesan = `Pesanan Anda:\nID: ${userID}\nItem: ${item}\nHarga: Rp ${harga}`;

    alert(pesan);

    // redirect ke WhatsApp
    window.open('https://wa.me/6287870207742?text=' + encodeURIComponent(pesan));
  }
</script>
</body>
</html>
